<!DOCTYPE html>
<html>
<head>
    <title>Simple Landing Page</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }

        nav a {
            margin: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .section {
            padding: 40px 20px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .box {
            border: 1px solid #ccc;
            padding: 20px;
            width: 200px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Website</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="section">
    <h2>Welcome to My Landing Page</h2>
    <p>This is a simple landing page made using HTML and CSS.</p>
</div>

<div class="section features">
    <div class="box">
        <h3>Feature 1</h3>
        <p>Easy layout</p>
    </div>
    <div class="box">
        <h3>Feature 2</h3>
        <p>Simple design</p>
    </div>
    <div class="box">
        <h3>Feature 3</h3>
        <p>Beginner friendly</p>
    </div>
</div>

<footer>
    <p>© 2026 My Simple Page</p>
</footer>

</body>
</html>
